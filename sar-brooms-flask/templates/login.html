{% extends "base.html" %}
{% block title %}Admin Login — SAR BROOMS{% endblock %}

{% block navbar %}{% endblock %}
{% block footer %}{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="SAR Brooms logo">
    <h2>Admin Login</h2>
    <p class="sub">Manage products &amp; company info</p>

    <form method="POST" action="{{ url_for('login') }}" class="text-start">
      <div class="mb-3">
        <label for="username">Username</label>
        <input type="text" class="form-control" id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="mb-4">
        <label for="password">Password</label>
        <input type="password" class="form-control" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-sar-primary w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Log In
      </button>
    </form>

    <a href="{{ url_for('index') }}" class="d-inline-block mt-4" style="color:var(--ink-soft);text-decoration:underline;font-size:0.9rem;">
      &larr; Back to site
    </a>
  </div>
</div>
{% endblock %}
